<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction | The Real Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --red: #b32020;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0.4;
  }

  /* Vertical gold line */
  .line-left {
    position: fixed;
    left: 48px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    opacity: 0.3;
    animation: fadeIn 2s ease forwards;
  }

  .line-right {
    position: fixed;
    right: 48px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    opacity: 0.3;
    animation: fadeIn 2s ease forwards;
  }

  /* Top bar */
  .topbar {
    position: fixed;
    top: 32px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    animation: slideDown 1s ease forwards;
    opacity: 0;
    animation-delay: 0.3s;
  }

  .topbar-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
  }

  /* Main content */
  .container {
    text-align: center;
    padding: 40px 24px;
    max-width: 680px;
    position: relative;
    z-index: 2;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 0.6s;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 14vw, 130px);
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--white);
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 0.8s;
    margin-bottom: 8px;
  }

  .title span {
    color: var(--gold);
  }

  .subtitle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    letter-spacing: 0.08em;
    color: var(--white);
    opacity: 0.4;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 1s;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 0 auto 48px;
    max-width: 320px;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 1.2s;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--gold);
    opacity: 0.3;
  }

  .divider-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* Message */
  .message {
    font-size: 16px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--white);
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 1.3s;
    margin-bottom: 56px;
    letter-spacing: 0.01em;
  }

  .message strong {
    font-weight: 500;
    color: var(--gold-light);
  }

  /* CTA Button */
  .cta-wrap {
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 1.5s;
  }

  .cta {
    display: inline-block;
    background: var(--gold);
    color: var(--black);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 18px 48px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--white);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }

  .cta:hover::before {
    transform: translateX(0);
  }

  .cta span {
    position: relative;
    z-index: 1;
  }

  .cta:hover {
    color: var(--black);
  }

  /* Bottom stamp */
  .stamp {
    position: fixed;
    bottom: 32px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
    animation-delay: 2s;
  }

  .stamp-text {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0.25;
  }

  /* Corner brackets */
  .bracket {
    position: fixed;
    width: 32px;
    height: 32px;
    opacity: 0.2;
    animation: fadeIn 2s ease forwards;
    animation-delay: 0.5s;
  }

  .bracket-tl { top: 24px; left: 24px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .bracket-tr { top: 24px; right: 24px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .bracket-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .bracket-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Fix double opacity on subtitle */
  .subtitle { opacity: 0 !important; animation: fadeUp 1s ease forwards !important; animation-delay: 1s !important; }

  @media (max-width: 480px) {
    .line-left, .line-right { display: none; }
    .container { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div class="bracket bracket-tl"></div>
<div class="bracket bracket-tr"></div>
<div class="bracket bracket-bl"></div>
<div class="bracket bracket-br"></div>
<div class="line-left"></div>
<div class="line-right"></div>

<div class="topbar">
  <span class="topbar-text">Reese Thomas LMSW-CSWI &nbsp;·&nbsp; The Real Work</span>
</div>

<div class="container">
  <p class="eyebrow">Under Construction</p>

  <h1 class="title">Under<br>Construction.<br><span>Just Like Us.</span></h1>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <p class="message">
    This channel is being built with intention.<br>
    <strong>Growth is not instant. Neither is this.</strong><br>
    Head to the main hub while we get ready.
  </p>

  <div class="cta-wrap">
    <a class="cta" href="https://www.skool.com/the-real-work-9281"><span>Go to The Real Work →</span></a>
  </div>
</div>

<div class="stamp">
  <span class="stamp-text">The Real Work &nbsp;·&nbsp; Real Skills. Real Growth.</span>
</div>

</body>
</html>
